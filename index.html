<!DOCTYPE html>
<html lang="ru">
<head>
       <!-- ==================== МЕТА-ТЕГИ ==================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- SEO -->
    <title>Joint Viewing — Совместный просмотр видео VK</title>
    <meta name="description" content="Joint Viewing — сервис для совместного просмотра видео VK в реальном времени. Создавайте комнаты, общайтесь в чате и смотрите видео вместе с друзьями.">
    <meta name="keywords" content="совместный просмотр, видео, VK, ВК, смотреть вместе, комната, чат, онлайн">
    <meta name="robots" content="index, follow">
    
    <!-- Favicon (простая текстовая иконка) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">

    <!-- ==================== СТИЛИ ==================== -->
    <link rel="stylesheet" href="style.css">

    <!-- ==================== ВНЕШНИЕ БИБЛИОТЕКИ ==================== -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    
    <!-- ==================== 1. ШАПКА ==================== -->
    <header class="app-header">
        <button id="backToMenuBtn" class="back-btn">НАЗАД</button>

        <div class="room-info">
            <span class="room-label">КОМНАТА</span>
            <span class="room-id" id="roomIdDisplay">----</span>
            <button id="copyRoomBtn" class="copy-btn">КОПИРОВАТЬ</button>
        </div>

        <div class="user-info">
            <span id="userNameDisplay">Гость</span>
            <div class="avatar-placeholder" id="userAvatar"></div>
        </div>
    </header>

    <!-- ==================== 2. ГЛАВНОЕ МЕНЮ ==================== -->
    <div id="mainMenu" class="main-menu">
        <div class="menu-content">
            <h1 class="menu-title">JOINT VIEWING</h1>
            <p class="menu-subtitle">Совместный просмотр видео</p>

            <button id="createRoomBtn" class="menu-btn primary-btn">СОЗДАТЬ КОМНАТУ</button>

            <div class="menu-divider">
                <span>или</span>
            </div>

            <div class="join-room-block">
                <input type="text" id="joinRoomInput" class="menu-input" placeholder="ID комнаты" maxlength="4">
                <button id="joinRoomBtn" class="menu-btn secondary-btn">ПРИСОЕДИНИТЬСЯ</button>
            </div>
        </div>
    </div>

    <!-- ==================== 3. ОСНОВНОЙ КОНТЕЙНЕР ==================== -->
    <main class="main-layout">

        <!-- ==================== 4. ПЛЕЕР (ЛЕВАЯ КОЛОНКА) ==================== -->
        <section class="player-section">
            <!-- Контейнер плеера -->
            <div class="player-wrapper" id="playerWrapper">
                <div id="vkPlayerContainer" class="player-inner">
                    <div class="player-placeholder">
                        <p>Вставьте ссылку на видео VK</p>
                        <p class="placeholder-hint">vk.com/video-85016643_456239733</p>
                    </div>
                </div>
            </div>

            <!-- Поле ввода ссылки и кнопка загрузки -->
            <div class="player-controls">
                <input type="text" id="videoUrlInput" class="video-url-input" placeholder="Ссылка на VK Видео...">
                <button id="loadVideoBtn" class="control-btn">ЗАГРУЗИТЬ</button>
            </div>

            <!-- Кнопки управления плеером -->
            <div class="sync-controls">
                <button id="playPauseBtn" class="sync-btn">ВОСПРОИЗВЕДЕНИЕ</button>
                <button id="syncSeekBtn" class="sync-btn secondary" disabled>СИНХРОНИЗАЦИЯ</button>
            </div>

            <!-- Кнопка раскрытия видео на весь экран -->
            <button id="expandVideoBtn" class="expand-btn">РАЗВЕРНУТЬ</button>
        </section>

        <!-- ==================== 5. ЧАТ (ПРАВАЯ КОЛОНКА) ==================== -->
        <section class="chat-section">
            <div class="chat-container">
                <!-- Шапка чата -->
                <div class="chat-header">
                    <span>ЧАТ КОМНАТЫ</span>
                    <div class="chat-header-right">
                        <button id="clearChatBtn" class="clear-chat-btn">ОЧИСТИТЬ</button>
                        <span id="onlineCount">1 онлайн</span>
                    </div>
                </div>

                <!-- Сообщения -->
                <div class="chat-messages" id="chatMessages">
                    <div class="message system">
                        <span class="message-text">Добро пожаловать в Joint Viewing</span>
                        <span class="message-time">Только что</span>
                    </div>
                </div>

                <!-- Поле ввода сообщения -->
                <div class="chat-input-area">
                    <input type="text" id="messageInput" class="chat-input" placeholder="Сообщение..." autocomplete="off">
                    <button id="sendMessageBtn" class="send-btn">→</button>
                </div>
            </div>

            <!-- Кнопки управления комнатой -->
            <div class="room-actions">
                <button id="shareRoomBtn" class="action-btn">ПОДЕЛИТЬСЯ</button>
                <button id="leaveRoomBtn" class="action-btn">ВЫЙТИ</button>
            </div>
        </section>
    </main>

    <!-- ==================== 6. ПОЛНОЭКРАННЫЙ РЕЖИМ ==================== -->
    <div id="fullscreenOverlay" class="fullscreen-overlay hidden">
        <div class="fullscreen-player" id="fullscreenPlayer"></div>
        <button id="closeFullscreenBtn" class="close-fullscreen-btn">СВЕРНУТЬ</button>
    </div>

    <!-- ==================== СКРИПТЫ ==================== -->
    <script src="script.js"></script>
</body>
</html>
